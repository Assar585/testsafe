server {
    listen 8080;
    index index.php;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access_log;
    # Root for the server
    root /var/www;

    # Handle assets that are physically in /public but requested without /public
    location ~ ^/(assets|uploads|vendors|js|css|fonts)/ {
        root /var/www/public;
        try_files $uri =404;
    }

    # Enable Gzip compression to speed up asset delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Serve static assets naturally from /var/www using the root directive
    # (no alias needed since root is already /var/www)
    
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
    }

    location / {
        try_files $uri /index.php?$query_string;
    }
}
