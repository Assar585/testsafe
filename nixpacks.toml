# Nixpacks configuration
[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nginx"]

[phases.install]
cmds = ["composer install --no-interaction --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache",
    "chmod -R 775 storage bootstrap/cache"
]

[variables]
NIXPACKS_PHP_ROOT = "."
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
# Disable automatic Node.js detection/install if Railpack/Nixpacks tries it
NIXPACKS_NO_NODEJS = "1"
NODE_ENV = "production"
